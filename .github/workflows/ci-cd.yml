name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # Шаг 1: Клонирование репозитория
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Шаг 2: Установка Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # Шаг 3: Кэширование Maven зависимостей
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
          
      # Шаг 4: Сборка проекта
      - name: Build with Maven
        run: mvn clean compile
        
      # Шаг 5: Запуск тестов
      - name: Run tests
        run: mvn test
        
      # Шаг 6: Упаковка приложения
      - name: Package application
        run: mvn package -DskipTests
        
      # Шаг 7: Сохранение JAR файла
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/
      
      # 🔥 ПРОСТОЕ РЕШЕНИЕ: Логин в Yandex Container Registry через OAuth-токен
      - name: Login to Yandex Container Registry
        run: |
          echo "${{ secrets.YC_OAUTH_TOKEN }}" | docker login \
            --username oauth \
            --password-stdin \
            cr.yandex
      
      # Сборка и пуш Docker образа
      - name: Build and push Docker image
        run: |
          # Собираем образ с тегом commit sha
          docker build -t cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:${{ github.sha }} .
          
          # Добавляем тег latest
          docker tag cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:${{ github.sha }} cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
          
          # Пушим оба тега
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:${{ github.sha }}
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Deploy to Yandex Cloud VM
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            # 🔥 ПРОСТОЕ РЕШЕНИЕ: Логин на ВМ через OAuth-токен
            echo "${{ secrets.YC_OAUTH_TOKEN }}" | docker login \
              --username oauth \
              --password-stdin \
              cr.yandex
            
            # Остановка старого контейнера
            docker stop todo-app || true
            docker rm todo-app || true
            
            # Загрузка нового образа
            docker pull cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
            
            # Запуск нового контейнера
            docker run -d \
              --name todo-app \
              --restart unless-stopped \
              -p 8080:8080 \
              cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
            
            # Очистка
            docker image prune -f
