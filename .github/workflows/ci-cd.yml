name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: cr.yandex
  IMAGE_NAME: todo-app
  # ВАЖНО: замените на ваш реальный идентификатор реестра в Yandex Cloud
  REGISTRY_ID: ваш-идентификатор-реестра

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Для GitHub Packages (если используете)
    
    steps:
      # 1. Клонирование репозитория (v4)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Установка Yandex Cloud CLI
      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH
          # Добавляем в PATH для текущей сессии
          echo "$HOME/yandex-cloud/bin" >> $PATH

      # 3. Подготовка ключа сервисного аккаунта и получение IAM-токена
      - name: Get IAM token for Service Account
        id: iam-token
        run: |
          # Создаем временный файл с ключом сервисного аккаунта из секрета
          echo '${{ secrets.YC_SA_JSON_KEY }}' > sa_key.json
          
          # Получаем IAM-токен (действует 12 часов)
          export IAM_TOKEN=$(yc iam create-token --service-account-key sa_key.json)
          
          # Сохраняем токен как переменную окружения для следующих шагов
          echo "IAM_TOKEN=${IAM_TOKEN}" >> $GITHUB_ENV
          
          # Удаляем файл с ключом
          rm sa_key.json

      # 4. Аутентификация в Yandex Container Registry через docker login
      - name: Login to Yandex Container Registry
        run: |
          echo "${{ env.IAM_TOKEN }}" | docker login \
            --username iam \
            --password-stdin \
            ${{ env.REGISTRY }}

      # 5. Настройка Docker Buildx 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 6. Сборка и публикация образа (v6 - актуальная для build-push-action)
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7. (Опционально) Загрузка артефактов сборки если нужно (v4)
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/build.log
          retention-days: 5

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      # 1. Клонирование репозитория (v4)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Установка Yandex Cloud CLI
      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      # 3. Получение IAM-токена для деплоя
      - name: Get IAM token for deployment
        run: |
          echo '${{ secrets.YC_SA_JSON_KEY }}' > sa_key.json
          export IAM_TOKEN=$(yc iam create-token --service-account-key sa_key.json)
          echo "IAM_TOKEN=${IAM_TOKEN}" >> $GITHUB_ENV
          rm sa_key.json

      # 4. Деплой в Yandex Cloud
      - name: Deploy to Yandex Cloud
        env:
          REGISTRY_ID: ${{ env.REGISTRY_ID }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          echo "Deploying image ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          
          # Пример деплоя в Yandex Cloud Serverless Container
          # yc serverless container revision deploy \
          #   --container-name my-container \
          #   --image ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          #   --service-account-id your-sa-id

      # 5. (Опционально) Скачивание артефактов если нужно (v4)
      - name: Download build artifacts
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: build-logs
          path: ./downloaded-logs
