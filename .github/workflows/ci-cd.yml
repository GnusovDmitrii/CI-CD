name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # Шаг 1: Клонирование репозитория
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Шаг 2: Установка Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # Шаг 3: Кэширование Maven зависимостей
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
          
      # Шаг 4: Сборка проекта
      - name: Build with Maven
        run: mvn clean compile
        
      # Шаг 5: Запуск тестов
      - name: Run tests
        run: mvn test
        
      # Шаг 6: Упаковка приложения
      - name: Package application
        run: mvn package -DskipTests
        
      # Шаг 7: Сохранение JAR файла
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          
      # Шаг 8: Уведомление об успехе
      - name: Success notification
        if: success()
        run: echo "✅ Build and tests completed successfully!"
        
      # Шаг 9: Уведомление об ошибке
      - name: Failure notification
        if: failure()
        run: echo "❌ Build or tests failed!"

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      # Шаг 1: Клонирование репозитория
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Шаг 2: Скачивание JAR файла
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/
      
      # Шаг 3: Логин в Yandex Container Registry
      - name: Login to Yandex Container Registry
        run: |
          echo "🔑 Логинимся в Yandex Container Registry..."
          echo "${{ secrets.YC_OAUTH_TOKEN }}" | docker login \
            --username oauth \
            --password-stdin \
            cr.yandex
          echo "✅ Успешно залогинились!"
      
      # Шаг 4: Сборка Docker образа
      - name: Build Docker image
        run: |
          echo "🏗️ Собираем Docker образ..."
          docker build -t cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:${{ github.sha }} .
          docker tag cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:${{ github.sha }} cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
          echo "✅ Образ собран успешно!"
          
      # Шаг 5: Отправка образа в реестр
      - name: Push Docker image to Yandex Container Registry
        run: |
          echo "📤 Отправляем образ в реестр..."
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:${{ github.sha }}
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
          echo "✅ Образ отправлен успешно!"

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      # Шаг 1: Деплой на виртуальную машину через SSH (без проверки fingerprint)
      - name: Deploy to Yandex Cloud VM
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          debug: true
          # Убираем fingerprint для теста
          script: |
            # Цветной вывод для наглядности
            GREEN='\033[0;32m'
            RED='\033[0;31m'
            YELLOW='\033[1;33m'
            NC='\033[0m' # No Color
            
            echo -e "${GREEN}========================================${NC}"
            echo -e "${GREEN}🚀 Начинаем деплой на сервер${NC}"
            echo -e "${GREEN}========================================${NC}"
            
            # Шаг 1: Проверка наличия Docker
            echo -e "${YELLOW}🔍 Проверяем Docker...${NC}"
            if ! command -v docker &> /dev/null; then
                echo -e "${RED}❌ Docker не установлен! Устанавливаем...${NC}"
                curl -fsSL https://get.docker.com -o get-docker.sh
                sudo sh get-docker.sh
                sudo usermod -aG docker $USER
                echo -e "${GREEN}✅ Docker установлен${NC}"
            else
                echo -e "${GREEN}✅ Docker уже установлен: $(docker --version)${NC}"
            fi
            
            # Шаг 2: Логин в Yandex Container Registry
            echo -e "${YELLOW}🔑 Логинимся в Yandex Container Registry...${NC}"
            echo "${{ secrets.YC_OAUTH_TOKEN }}" | docker login \
              --username oauth \
              --password-stdin \
              cr.yandex
            echo -e "${GREEN}✅ Успешно залогинились${NC}"
            
            # Шаг 3: Остановка и удаление старого контейнера
            echo -e "${YELLOW}🛑 Останавливаем старый контейнер...${NC}"
            docker stop todo-app || true
            docker rm todo-app || true
            echo -e "${GREEN}✅ Старый контейнер остановлен${NC}"
            
            # Шаг 4: Загрузка нового образа
            echo -e "${YELLOW}📦 Загружаем новый образ...${NC}"
            docker pull cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
            echo -e "${GREEN}✅ Образ загружен${NC}"
            
            # Шаг 5: Запуск нового контейнера
            echo -e "${YELLOW}▶️ Запускаем новый контейнер...${NC}"
            docker run -d \
              --name todo-app \
              --restart unless-stopped \
              -p 8080:8080 \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
            echo -e "${GREEN}✅ Контейнер запущен${NC}"
            
            # Шаг 6: Проверка статуса контейнера
            echo -e "${YELLOW}🔍 Проверяем статус контейнера...${NC}"
            sleep 5
            if [ "$(docker ps -q -f name=todo-app)" ]; then
                echo -e "${GREEN}✅ Контейнер успешно запущен!${NC}"
                docker ps | grep todo-app
                
                # Шаг 7: Проверка здоровья приложения
                echo -e "${YELLOW}🏥 Проверяем здоровье приложения...${NC}"
                sleep 10
                if curl -f http://localhost:8080/actuator/health &>/dev/null; then
                    echo -e "${GREEN}✅ Приложение здорово!${NC}"
                    echo -e "${GREEN}📊 Статус: $(curl -s http://localhost:8080/actuator/health | jq .status 2>/dev/null || echo 'unknown')${NC}"
                else
                    echo -e "${RED}⚠️ Приложение не отвечает на health check${NC}"
                    echo -e "${YELLOW}Последние логи контейнера:${NC}"
                    docker logs todo-app --tail 20
                fi
            else
                echo -e "${RED}❌ Контейнер не запустился!${NC}"
                echo -e "${YELLOW}Логи контейнера:${NC}"
                docker logs todo-app
                exit 1
            fi
            
            # Шаг 8: Очистка старых образов
            echo -e "${YELLOW}🧹 Очищаем старые образы...${NC}"
            docker image prune -f
            echo -e "${GREEN}✅ Очистка завершена${NC}"
            
            # Шаг 9: Итоговая информация
            echo -e "${GREEN}========================================${NC}"
            echo -e "${GREEN}🎉 Деплой завершен успешно!${NC}"
            echo -e "${GREEN}========================================${NC}"
            echo -e "🌐 Приложение доступно по адресу: http://${{ secrets.VM_HOST }}:8080"
            echo -e "📝 API endpoints:"
            echo -e "   GET  /tasks - список всех задач"
            echo -e "   POST /tasks - создать задачу"
            echo -e "   PUT  /tasks/{id} - обновить задачу"
            echo -e "   DEL  /tasks/{id} - удалить задачу"
            echo -e "${GREEN}========================================${NC}"
