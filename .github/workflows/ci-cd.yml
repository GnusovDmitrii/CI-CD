name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
          
      - name: Build with Maven
        run: mvn clean compile
        
      - name: Run tests
        run: mvn test
        
      - name: Package application
        run: mvn package -DskipTests
        
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

 docker-build:
  needs: build-and-test
  runs-on: ubuntu-latest
  if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
  
  steps:
    - uses: actions/checkout@v3
    
    - name: Download JAR artifact
      uses: actions/download-artifact@v3
      with:
        name: app-jar
        path: target/
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    
    - name: Login to Yandex Container Registry
      run: |
        echo "${{ secrets.YC_SA_KEY }}" | docker login \
          --username json_key \
          --password-stdin \
          cr.yandex
      
    
    - name: Build and push Docker image
      run: |
        docker build -t cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest .
        docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
        docker tag cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:${{ github.sha }}
        docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:${{ github.sha }}
  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Deploy to Yandex Cloud VM
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            # ИЗМЕНЕНО: Вход в Yandex Container Registry на ВМ
            echo "${{ secrets.YC_SA_KEY }}" | docker login --username json_key --password-stdin cr.yandex
            
            # Остановка и удаление старого контейнера
            docker stop todo-app || true
            docker rm todo-app || true
            
            # Загрузка нового образа
            docker pull cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
            
            # Запуск нового контейнера
            docker run -d \
              --name todo-app \
              --restart unless-stopped \
              -p 8080:8080 \
              cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
            
            # Очистка неиспользуемых образов
            docker image prune -f
