name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # Шаг 1: Клонирование репозитория
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Шаг 2: Установка Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # Шаг 3: Кэширование Maven зависимостей (для ускорения)
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
          
      # Шаг 4: Сборка проекта
      - name: Build with Maven
        run: mvn clean compile
        
      # Шаг 5: Запуск тестов
      - name: Run tests
        run: mvn test
        
      # Шаг 6: Упаковка приложения в JAR
      - name: Package application
        run: mvn package -DskipTests
        
      # Шаг 7: Сохранение JAR файла как артефакта
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          
      # Шаг 8: Уведомление об успехе
      - name: Success notification
        if: success()
        run: echo "✅ Build and tests completed successfully!"
        
      # Шаг 9: Уведомление об ошибке
      - name: Failure notification
        if: failure()
        run: echo "❌ Build or tests failed!"

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    # Запускается только при пуше в main/master (не при PR)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      # Шаг 1: Клонирование репозитория
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Шаг 2: Скачивание JAR файла из предыдущей job
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/
          
      # Шаг 3: Установка Yandex Cloud CLI (для правильной аутентификации)
      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH
          
      # Шаг 4: Аутентификация в Yandex Cloud с помощью JSON-ключа
      - name: Authenticate to Yandex Cloud
        env:
          YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
        run: |
          # Создаем временный файл с ключом
          echo "$YC_SA_KEY" > /tmp/key.json
          # Инициализируем профиль YC
          yc config set service-account-key /tmp/key.json
          yc config set cloud-id $(cat /tmp/key.json | jq -r .cloud_id)
          yc config set folder-id $(cat /tmp/key.json | jq -r .folder_id)
          
      # Шаг 5: Получение IAM-токена и логин в Docker
      - name: Login to Yandex Container Registry
        run: |
          # Получаем IAM-токен для аутентификации в Docker
          IAM_TOKEN=$(yc iam create-token)
          echo "$IAM_TOKEN" | docker login \
            --username iam \
            --password-stdin \
            cr.yandex
            
      # Шаг 6: Сборка Docker образа
      - name: Build Docker image
        run: |
          docker build -t cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:${{ github.sha }} .
          docker tag cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:${{ github.sha }} cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
          
      # Шаг 7: Отправка образа в Yandex Container Registry
      - name: Push Docker image to Yandex Container Registry
        run: |
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:${{ github.sha }}
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
          
      # Шаг 8: Очистка (удаляем временный ключ)
      - name: Cleanup
        if: always()
        run: rm -f /tmp/key.json

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      # Шаг 1: Деплой на виртуальную машину через SSH
      - name: Deploy to Yandex Cloud VM
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            # Цветной вывод для наглядности
            GREEN='\033[0;32m'
            RED='\033[0;31m'
            NC='\033[0m' # No Color
            
            echo -e "${GREEN}Начинаем деплой...${NC}"
            
            # Проверка наличия Docker
            if ! command -v docker &> /dev/null; then
                echo -e "${RED}Docker не установлен! Устанавливаем...${NC}"
                curl -fsSL https://get.docker.com -o get-docker.sh
                sudo sh get-docker.sh
                sudo usermod -aG docker $USER
            fi
            
            # Логин в Yandex Container Registry
            echo "${{ secrets.YC_SA_KEY }}" > /tmp/key.json
            
            # Получаем IAM-токен и логинимся
            IAM_TOKEN=$(curl -H "Authorization: Bearer $(cat /tmp/key.json | jq -r .private_key)" \
              https://iam.api.cloud.yandex.net/iam/v1/tokens)
            
            echo "$IAM_TOKEN" | docker login \
              --username iam \
              --password-stdin \
              cr.yandex
            
            rm -f /tmp/key.json
            
            # Остановка и удаление старого контейнера
            echo -e "${GREEN}Останавливаем старый контейнер...${NC}"
            docker stop todo-app || true
            docker rm todo-app || true
            
            # Загрузка нового образа
            echo -e "${GREEN}Загружаем новый образ...${NC}"
            docker pull cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
            
            # Запуск нового контейнера
            echo -e "${GREEN}Запускаем новый контейнер...${NC}"
            docker run -d \
              --name todo-app \
              --restart unless-stopped \
              -p 8080:8080 \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              cr.yandex/${{ secrets.YC_REGISTRY_ID }}/todo-app:latest
            
            # Проверка, что контейнер запустился
            sleep 5
            if [ "$(docker ps -q -f name=todo-app)" ]; then
                echo -e "${GREEN}✅ Контейнер успешно запущен!${NC}"
                docker ps | grep todo-app
                
                # Проверка здоровья приложения
                echo -e "${GREEN}Проверяем здоровье приложения...${NC}"
                sleep 10
                curl -f http://localhost:8080/actuator/health || echo -e "${RED}⚠️ Приложение не отвечает на health check${NC}"
            else
                echo -e "${RED}❌ Контейнер не запустился!${NC}"
                docker logs todo-app
                exit 1
            fi
            
            # Очистка неиспользуемых образов (экономия места)
            echo -e "${GREEN}Очищаем старые образы...${NC}"
            docker image prune -f
            
            echo -e "${GREEN}✅ Деплой завершен успешно!${NC}"
